<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Terminal green glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline effect -->
    <pattern id="scanlines" x="0" y="0" width="400" height="4" patternUnits="userSpaceOnUse">
      <rect width="400" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#001200"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <!-- Fixed: was incorrectly declared as linearGradient with radial attributes -->
    <radialGradient id="wheelRadial" cx="50%" cy="50%" r="50%" fx="40%" fy="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#050d05" rx="12"/>

  <!-- ── iPod Classic body ── -->
  <rect x="80" y="30" width="240" height="400" rx="30" ry="30" fill="url(#bodyGrad)" stroke="#444" stroke-width="1.5"/>

  <!-- Screen bezel -->
  <rect x="100" y="55" width="200" height="155" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Screen -->
  <rect x="105" y="60" width="190" height="145" rx="5" fill="url(#screenGrad)"/>
  <!-- Scanlines overlay -->
  <rect x="105" y="60" width="190" height="145" rx="5" fill="url(#scanlines)" opacity="0.5"/>

  <!-- ── TUI content on screen ── -->
  <!-- Title bar -->
  <rect x="105" y="60" width="190" height="14" rx="5" fill="#003300"/>
  <rect x="105" y="68" width="190" height="6" fill="#003300"/>
  <text x="200" y="71" font-family="monospace" font-size="8" fill="#00ff41" text-anchor="middle" filter="url(#glow)">♫ console-music-player</text>

  <!-- Library panel -->
  <rect x="107" y="76" width="110" height="79" fill="rgba(0,30,0,0.6)"/>
  <!-- Track list — format: Title · Artist · Album (Year) -->
  <text x="110" y="87" font-family="monospace" font-size="5.5" fill="#00cc33">▶ Echoes  ·  Daft Punk</text>
  <text x="110" y="96" font-family="monospace" font-size="5.5" fill="#00ff41" filter="url(#glow)">  Neon Nightfall  ·  XM</text>
  <text x="110" y="105" font-family="monospace" font-size="5.5" fill="#00cc33">  Terminal Dreams (1994)</text>
  <text x="110" y="114" font-family="monospace" font-size="5.5" fill="#00cc33">  Silicon Serenade  ·  IT</text>
  <text x="110" y="123" font-family="monospace" font-size="5.5" fill="#00cc33">  The Last CRT  ·  MOD</text>
  <text x="110" y="132" font-family="monospace" font-size="5.5" fill="#00cc33">  Floppy Disk Blues</text>
  <text x="110" y="141" font-family="monospace" font-size="5.5" fill="#005500">──────────────────</text>

  <!-- Right panel: player -->
  <rect x="219" y="76" width="74" height="79" fill="rgba(0,20,0,0.7)"/>
  <text x="256" y="87" font-family="monospace" font-size="5.5" fill="#00ff41" text-anchor="middle" filter="url(#glow)">▶ PLAYING</text>
  <text x="222" y="96" font-family="monospace" font-size="5" fill="#00cc33">Neon Nightfall</text>
  <text x="222" y="104" font-family="monospace" font-size="4.5" fill="#009922">Tracker · XM</text>
  <!-- Progress bar -->
  <rect x="222" y="109" width="68" height="3" rx="1" fill="#003300"/>
  <rect x="222" y="109" width="28" height="3" rx="1" fill="#00ff41" filter="url(#glow)"/>
  <text x="222" y="119" font-family="monospace" font-size="4.5" fill="#00aa22">01:23 / 03:47</text>
  <!-- Volume -->
  <text x="222" y="128" font-family="monospace" font-size="4.5" fill="#007711">VOL ████░░░░░░</text>
  <!-- Device -->
  <text x="222" y="137" font-family="monospace" font-size="4.5" fill="#005500">──────────────</text>
  <text x="222" y="146" font-family="monospace" font-size="4.5" fill="#00aa22">iPod Classic ✓</text>

  <!-- Status bar at bottom of screen -->
  <rect x="105" y="197" width="190" height="8" rx="0" fill="#002200"/>
  <text x="108" y="204" font-family="monospace" font-size="5" fill="#00ff41">↑↓ nav  [E] tags  [T] transfer</text>

  <!-- ── Click wheel ── -->
  <!-- Outer ring -->
  <circle cx="200" cy="335" r="85" fill="url(#wheelRadial)" stroke="#555" stroke-width="1.5"/>
  <!-- Inner center button -->
  <circle cx="200" cy="335" r="32" fill="#222" stroke="#444" stroke-width="1"/>
  <circle cx="200" cy="335" r="28" fill="#1a1a1a"/>

  <!-- Wheel menu labels (classic iPod style) -->
  <text x="200" y="271" font-family="Arial, sans-serif" font-size="9" fill="#aaa" text-anchor="middle" font-weight="bold">MENU</text>
  <text x="138" y="339" font-family="Arial, sans-serif" font-size="8" fill="#aaa" text-anchor="middle">⏮</text>
  <text x="262" y="339" font-family="Arial, sans-serif" font-size="8" fill="#aaa" text-anchor="middle">⏭</text>
  <text x="200" y="404" font-family="Arial, sans-serif" font-size="8" fill="#aaa" text-anchor="middle">▶⏸</text>

  <!-- Center button select ring -->
  <circle cx="200" cy="335" r="30" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- ── Bottom connector hint ── -->
  <rect x="175" y="428" width="50" height="6" rx="3" fill="#333" stroke="#444" stroke-width="0.5"/>

  <!-- ── Floating terminal cursor blink ── -->
  <rect x="289" y="196" width="5" height="8" fill="#00ff41" filter="url(#glow)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ── Decorative corner brackets (terminal aesthetic) ── -->
  <text x="8" y="22" font-family="monospace" font-size="14" fill="#00ff41" opacity="0.4" filter="url(#glow)">┌─</text>
  <text x="356" y="22" font-family="monospace" font-size="14" fill="#00ff41" opacity="0.4" filter="url(#glow)">─┐</text>
  <text x="8" y="492" font-family="monospace" font-size="14" fill="#00ff41" opacity="0.4" filter="url(#glow)">└─</text>
  <text x="356" y="492" font-family="monospace" font-size="14" fill="#00ff41" opacity="0.4" filter="url(#glow)">─┘</text>

  <!-- ── Version badge ── -->
  <text x="200" y="488" font-family="monospace" font-size="7" fill="#004400" text-anchor="middle">cmp v0.1.0 — GPL-3.0</text>
</svg>
